<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>血压守护 - 自动测试</title>
<style>
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#f0f2f5;padding:20px;max-width:800px;margin:0 auto}
h1{color:#667eea;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:#999;margin-bottom:30px;font-size:14px}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card h3{color:#333;margin-bottom:12px}
.result-table{width:100%;border-collapse:collapse}
.result-table th,.result-table td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-size:14px}
.result-table th{background:#f8f9fa;font-weight:600}
.pass{color:#28a745}
.fail{color:#dc3545}
.pending{color:#ffc107}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:12px 30px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin:5px}
.btn:hover{opacity:.9}
.btn-green{background:linear-gradient(135deg,#51cf66,#20c997)}
.btn-orange{background:linear-gradient(135deg,#ff9a56,#ff5757)}
#log{background:#1e1e1e;color:#d4d4d4;padding:16px;border-radius:10px;font-family:Consolas,monospace;font-size:13px;max-height:400px;overflow-y:auto;white-space:pre-wrap;line-height:1.6}
#summary{text-align:center;font-size:18px;padding:16px;border-radius:10px;margin-bottom:16px}
</style>
</head>
<body>
<h1>🏥 血压守护 - 自动测试</h1>
<p class="subtitle">自动运行全部功能测试，验证数据写入、读取、交互逻辑</p>

<div id="summary"></div>

<div class="card">
    <h3>测试结果</h3>
    <table class="result-table" id="resultTable">
        <tr><th>测试项</th><th>状态</th><th>详情</th></tr>
    </table>
</div>

<div class="card">
    <h3>详细日志</h3>
    <div id="log"></div>
</div>

<div class="card" style="text-align:center">
    <button class="btn btn-orange" onclick="runTests()">🔄 重新运行全部测试</button>
    <button class="btn btn-green" onclick="loadDemoAndTest()">📋 加载演示数据并进入APP</button>
    <button class="btn" onclick="clearAllData()">🗑️ 清除所有数据</button>
</div>

<script>
var testResults=[];
var testLog=[];

function log(msg,level){
    level=level||'info';
    var prefix=level==='pass'?'✅':(level==='fail'?'❌':(level==='warn'?'⚠️':'ℹ️'));
    testLog.push(prefix+' '+msg);
    var el=document.getElementById('log');
    if(el){
        el.textContent=testLog.join('\n');
        el.scrollTop=el.scrollHeight
    }
}

function addResult(name,status,detail){
    testResults.push({name:name,status:status,detail:detail});
    var table=document.getElementById('resultTable');
    var row=table.insertRow();
    var cls=status==='pass'?'pass':(status==='fail'?'fail':'pending');
    var icon=status==='pass'?'✅':(status==='fail'?'❌':'⏳');
    row.innerHTML='<td>'+name+'</td><td class="'+cls+'">'+icon+' '+status+'</td><td>'+detail+'</td>'
}

function pad(n){return n<10?'0'+n:''+n}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function genId(){return Date.now()+Math.floor(Math.random()*10000)}

function clearAllData(){
    var keys=[];
    for(var i=0;i<localStorage.length;i++){
        var key=localStorage.key(i);
        if(key.indexOf('bp_')===0)keys.push(key)
    }
    keys.forEach(function(k){localStorage.removeItem(k)});
    log('已清除 '+keys.length+' 项数据','warn');
    alert('已清除 '+keys.length+' 项数据');
    runTests()
}

function runTests(){
    testResults=[];testLog=[];
    document.getElementById('resultTable').innerHTML='<tr><th>测试项</th><th>状态</th><th>详情</th></tr>';
    log('=== 开始测试 ===');
    
    try{
        testLocalStorage();
        testCreateUser();
        testAddParent();
        testAddMedication();
        testInventoryAlert();
        testMedicineLog();
        testConfirmMed();
        testBpRecord();
        testSwitchParent();
        testDateNav();
        testAlertSystem();
        testExportData();
        testPushNotification();
    }catch(e){
        log('测试异常: '+e.message,'fail');
        addResult('异常','fail',e.message)
    }
    
    log('=== 测试完成 ===');
    var passed=testResults.filter(function(r){return r.status==='pass'}).length;
    var failed=testResults.filter(function(r){return r.status==='fail'}).length;
    log('总计: '+testResults.length+' 项, 通过 '+passed+', 失败 '+failed);
    
    var s=document.getElementById('summary');
    if(failed===0){
        s.innerHTML='<div style="background:#d4edda;color:#155724;padding:16px;border-radius:10px"><strong>🎉 全部测试通过！</strong><br>'+testResults.length+' 项测试全部通过</div>'
    }else{
        s.innerHTML='<div style="background:#f8d7da;color:#721c24;padding:16px;border-radius:10px"><strong>❌ 存在失败</strong><br>'+passed+'/'+testResults.length+' 通过, '+failed+' 失败</div>'
    }
}

function testLocalStorage(){
    log('测试 localStorage 可用性...');
    try{
        localStorage.setItem('bp_test_key','test_value');
        var v=localStorage.getItem('bp_test_key');
        if(v==='test_value'){
            addResult('localStorage','pass','读写正常');
            log('localStorage 可用','pass')
        }else{
            addResult('localStorage','fail','写入后读取值不一致');
            log('localStorage 写入后读取值不一致','fail')
        }
        localStorage.removeItem('bp_test_key')
    }catch(e){
        addResult('localStorage','fail','不可用: '+e.message);
        log('localStorage 不可用: '+e.message,'fail')
    }
}

function testCreateUser(){
    log('测试用户创建...');
    clearAllDataInner();
    
    try{
        var uid=Date.now();
        var state={uid:uid,pid:null,pname:'',parents:[]};
        localStorage.setItem('bp_app_state',JSON.stringify(state));
        
        var saved=JSON.parse(localStorage.getItem('bp_app_state'));
        if(saved.uid===uid&&saved.parents.length===0){
            addResult('用户创建','pass','uid='+uid);
            log('用户创建成功','pass')
        }else{
            addResult('用户创建','fail','数据不匹配');
            log('用户创建数据不匹配','fail')
        }
    }catch(e){
        addResult('用户创建','fail',e.message);
        log('用户创建失败: '+e.message,'fail')
    }
}

function testAddParent(){
    log('测试添加父母...');
    
    try{
        var p1=Date.now(),p2=Date.now()+1;
        var state={uid:10001,pid:p1,pname:'张大爷',parents:[
            {id:p1,name:'张大爷',age:68,gender:'男'},
            {id:p2,name:'李奶奶',age:65,gender:'女'}
        ]};
        localStorage.setItem('bp_app_state',JSON.stringify(state));
        
        var saved=JSON.parse(localStorage.getItem('bp_app_state'));
        if(saved.parents.length===2&&saved.parents[0].name==='张大爷'){
            addResult('添加父母','pass','2位父母已添加');
            log('添加父母成功','pass')
        }else{
            addResult('添加父母','fail','父母数据不正确');
            log('添加父母失败','fail')
        }
    }catch(e){
        addResult('添加父母','fail',e.message);
        log('添加父母异常: '+e.message,'fail')
    }
}

function testAddMedication(){
    log('测试添加药物...');
    
    try{
        var state=JSON.parse(localStorage.getItem('bp_app_state'));
        var p1=state.parents[0].id;
        var meds=[
            {id:20001,name:'硝苯地平',dosage:'1片',frequency:'twice',times:['08:00','18:00'],quantity:14},
            {id:20002,name:'阿司匹林',dosage:'100mg',frequency:'once',times:['08:00'],quantity:30}
        ];
        localStorage.setItem('bp_meds_'+p1,JSON.stringify(meds));
        
        var saved=JSON.parse(localStorage.getItem('bp_meds_'+p1));
        if(saved.length===2&&saved[0].name==='硝苯地平'&&saved[0].quantity===14){
            addResult('添加药物','pass','2种药物，含库存');
            log('添加药物成功','pass')
        }else{
            addResult('添加药物','fail','药物数据不正确');
            log('添加药物失败','fail')
        }
    }catch(e){
        addResult('添加药物','fail',e.message);
        log('添加药物异常: '+e.message,'fail')
    }
}

function testInventoryAlert(){
    log('测试库存预警...');
    
    try{
        var state=JSON.parse(localStorage.getItem('bp_app_state'));
        var p1=state.parents[0].id;
        var meds=JSON.parse(localStorage.getItem('bp_meds_'+p1));
        
        var lowStock=meds.filter(function(m){
            var daily=m.times?m.times.length:1;
            return m.quantity!==undefined&&m.quantity<daily*7
        });
        
        if(lowStock.length===1&&lowStock[0].name==='硝苯地平'){
            addResult('库存预警','pass','硝苯地平库存不足7天');
            log('库存预警检测正确','pass')
        }else{
            addResult('库存预警','fail','预警药物不匹配');
            log('库存预警检测错误','fail')
        }
    }catch(e){
        addResult('库存预警','fail',e.message);
        log('库存预警异常: '+e.message,'fail')
    }
}

function testMedicineLog(){
    log('测试服药计划生成...');
    
    try{
        var state=JSON.parse(localStorage.getItem('bp_app_state'));
        var p1=state.parents[0].id;
        var meds=JSON.parse(localStorage.getItem('bp_meds_'+p1));
        var td=new Date();
        var today=td.getFullYear()+'-'+pad(td.getMonth()+1)+'-'+pad(td.getDate());
        
        var logs=[];
        meds.forEach(function(m){
            m.times.forEach(function(t){
                logs.push({medId:m.id,medName:m.name,date:today,time:t,status:'pending'})
            })
        });
        
        if(logs.length===3){
            addResult('服药计划','pass','今日生成 '+logs.length+' 条记录');
            log('服药计划生成正确','pass')
        }else{
            addResult('服药计划','fail','应生成3条，实际'+logs.length+'条');
            log('服药计划生成数量错误','fail')
        }
    }catch(e){
        addResult('服药计划','fail',e.message);
        log('服药计划异常: '+e.message,'fail')
    }
}

function testConfirmMed(){
    log('测试确认服药+库存扣减...');
    
    try{
        var state=JSON.parse(localStorage.getItem('bp_app_state'));
        var p1=state.parents[0].id;
        var meds=JSON.parse(localStorage.getItem('bp_meds_'+p1));
        
        var beforeQty=meds[0].quantity;
        meds[0].quantity=Math.max(0,meds[0].quantity-1);
        localStorage.setItem('bp_meds_'+p1,JSON.stringify(meds));
        
        var saved=JSON.parse(localStorage.getItem('bp_meds_'+p1));
        if(saved[0].quantity===beforeQty-1){
            addResult('确认服药','pass','库存从 '+beforeQty+' → '+saved[0].quantity);
            log('确认服药成功，库存扣减正确','pass')
        }else{
            addResult('确认服药','fail','库存扣减不正确');
            log('确认服药失败','fail')
        }
    }catch(e){
        addResult('确认服药','fail',e.message);
        log('确认服药异常: '+e.message,'fail')
    }
}

function testBpRecord(){
    log('测试血压记录...');
    
    try{
        var state=JSON.parse(localStorage.getItem('bp_app_state'));
        var p1=state.parents[0].id;
        var bps=[
            {id:1,systolic:138,diastolic:88,hr:75,time:'2026-05-01 08:00'},
            {id:2,systolic:125,diastolic:82,hr:72,time:'2026-05-01 20:00'}
        ];
        localStorage.setItem('bp_data_'+p1,JSON.stringify(bps));
        
        var saved=JSON.parse(localStorage.getItem('bp_data_'+p1));
        if(saved.length===2&&saved[0].systolic===138){
            addResult('血压记录','pass','2条记录写入成功');
            log('血压记录写入正确','pass')
        }else{
            addResult('血压记录','fail','数据不正确');
            log('血压记录失败','fail')
        }
    }catch(e){
        addResult('血压记录','fail',e.message);
        log('血压记录异常: '+e.message,'fail')
    }
}

function testSwitchParent(){
    log('测试切换父母...');
    
    try{
        var state=JSON.parse(localStorage.getItem('bp_app_state'));
        var p1=state.parents[0].id;
        var p2=state.parents[1].id;
        
        var meds1=JSON.parse(localStorage.getItem('bp_meds_'+p1)||'[]');
        localStorage.setItem('bp_meds_'+p2,JSON.stringify([]));
        
        var p1Meds=JSON.parse(localStorage.getItem('bp_meds_'+p1));
        var p2Meds=JSON.parse(localStorage.getItem('bp_meds_'+p2));
        
        if(p1Meds.length===2&&p2Meds.length===0){
            addResult('切换父母','pass','数据隔离正确');
            log('切换父母数据隔离正确','pass')
        }else{
            addResult('切换父母','fail','数据未隔离');
            log('切换父母数据未隔离','fail')
        }
    }catch(e){
        addResult('切换父母','fail',e.message);
        log('切换父母异常: '+e.message,'fail')
    }
}

function testDateNav(){
    log('测试日期导航...');
    
    try{
        var td=new Date();
        var today=td.getFullYear()+'-'+pad(td.getMonth()+1)+'-'+pad(td.getDate());
        
        var yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
        var yd=yesterday.getFullYear()+'-'+pad(yesterday.getMonth()+1)+'-'+pad(yesterday.getDate());
        
        var tm=new Date();tm.setDate(tm.getDate()+1);
        var tmd=tm.getFullYear()+'-'+pad(tm.getMonth()+1)+'-'+pad(tm.getDate());
        
        if(yd<today&&tmd>today){
            addResult('日期导航','pass','日期计算正确');
            log('日期导航计算正确','pass')
        }else{
            addResult('日期导航','fail','日期计算错误');
            log('日期导航失败','fail')
        }
    }catch(e){
        addResult('日期导航','fail',e.message);
        log('日期导航异常: '+e.message,'fail')
    }
}

function testAlertSystem(){
    log('测试预警系统...');
    
    try{
        var state=JSON.parse(localStorage.getItem('bp_app_state'));
        var p1=state.parents[0].id;
        
        var alerts=[
            {id:1,logId:100,medName:'硝苯地平',diff:15,level:'warn',status:'active'},
            {id:2,logId:101,medName:'阿司匹林',diff:45,level:'critical',status:'active'}
        ];
        localStorage.setItem('bp_alerts_'+p1,JSON.stringify(alerts));
        
        var saved=JSON.parse(localStorage.getItem('bp_alerts_'+p1));
        if(saved.length===2){
            var critical=saved.filter(function(a){return a.level==='critical'});
            if(critical.length===1){
                addResult('预警系统','pass','预警分级正确');
                log('预警系统分级正确','pass')
            }else{
                addResult('预警系统','fail','预警分级不正确');
                log('预警系统分级错误','fail')
            }
        }else{
            addResult('预警系统','fail','预警数量不正确');
            log('预警系统失败','fail')
        }
    }catch(e){
        addResult('预警系统','fail',e.message);
        log('预警系统异常: '+e.message,'fail')
    }
}

function testExportData(){
    log('测试数据导出...');
    
    try{
        if('Blob' in window){
            var csv='\ufeff测试\n数据';
            var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
            if(blob.size>0){
                addResult('数据导出','pass','Blob 创建成功');
                log('数据导出功能可用','pass')
            }else{
                addResult('数据导出','fail','Blob 创建失败');
                log('数据导出失败','fail')
            }
        }else{
            addResult('数据导出','fail','浏览器不支持 Blob');
            log('浏览器不支持 Blob','fail')
        }
    }catch(e){
        addResult('数据导出','fail',e.message);
        log('数据导出异常: '+e.message,'fail')
    }
}

function testPushNotification(){
    log('测试推送通知...');
    
    try{
        if('Notification' in window){
            addResult('推送通知','pass','浏览器支持推送 API');
            log('推送通知 API 可用','pass')
        }else{
            addResult('推送通知','fail','API 不可用');
            log('推送通知 API 不可用','fail')
        }
    }catch(e){
        addResult('推送通知','fail',e.message);
        log('推送通知异常: '+e.message,'fail')
    }
}

function clearAllDataInner(){
    var keys=[];
    for(var i=0;i<localStorage.length;i++){
        var key=localStorage.key(i);
        if(key.indexOf('bp_')===0)keys.push(key)
    }
    keys.forEach(function(k){localStorage.removeItem(k)})
}

function loadDemoAndTest(){
    var td=todayStr();
    var uid=10001,p1=10010,p2=10011;
    var m1=20001,m2=20002,m3=20003,m4=20004;
    
    var S={uid:uid,pid:p1,pname:'张大爷',parents:[
        {id:p1,name:'张大爷',age:68,gender:'男'},
        {id:p2,name:'李奶奶',age:65,gender:'女'}
    ]};
    localStorage.setItem('bp_app_state',JSON.stringify(S));
    
    var meds1=[
        {id:m1,name:'硝苯地平',dosage:'1片',frequency:'twice',times:['08:00','18:00'],quantity:5},
        {id:m2,name:'阿司匹林',dosage:'100mg',frequency:'once',times:['08:00'],quantity:3},
        {id:m3,name:'氨氯地平',dosage:'5mg',frequency:'once',times:['20:00'],quantity:30}
    ];
    localStorage.setItem('bp_meds_'+p1,JSON.stringify(meds1));
    
    var meds2=[
        {id:m4,name:'卡托普利',dosage:'12.5mg',frequency:'thrice',times:['07:00','12:00','19:00'],quantity:20}
    ];
    localStorage.setItem('bp_meds_'+p2,JSON.stringify(meds2));
    
    var logs1=[];
    var j;
    for(j=0;j<7;j++){
        var date=daysAgo(j);
        meds1.forEach(function(m){
            m.times.forEach(function(t){
                var status='pending';
                if(j>0){var r=Math.random();status=r<0.7?'taken':(r<0.9?'missed':'pending')}
                else if(t<'10:00')status='taken';
                logs1.push({id:genId(),medId:m.id,medName:m.name,dosage:m.dosage,date:date,time:t,scheduled:date+' '+t,status:status,confirmedAt:status==='taken'?date+' '+t:null})
            })
        })
    }
    localStorage.setItem('bp_logs_'+p1,JSON.stringify(logs1));
    
    var logs2=[];
    meds2.forEach(function(m){
        m.times.forEach(function(t){
            var status=t<'10:00'?'taken':'pending';
            logs2.push({id:genId(),medId:m.id,medName:m.name,dosage:m.dosage,date:td,time:t,scheduled:td+' '+t,status:status,confirmedAt:status==='taken'?td+' '+t:null})
        })
    });
    localStorage.setItem('bp_logs_'+p2,JSON.stringify(logs2));
    
    var bps1=[];
    var k;
    for(k=0;k<14;k++){
        var date=daysAgo(k);
        var h=k<7?8:16;
        var mi=Math.floor(Math.random()*30);
        bps1.push({id:genId(),systolic:135+Math.floor(Math.random()*20-10),diastolic:85+Math.floor(Math.random()*16-8),hr:68+Math.floor(Math.random()*16),note:k<3?'晨起':(k<6?'午饭后':'睡前'),time:date+' '+pad(h)+':'+pad(mi)})
    }
    bps1.sort(function(a,b){return a.time<b.time?1:-1});
    localStorage.setItem('bp_data_'+p1,JSON.stringify(bps1));
    
    var bps2=[];
    var l;
    for(l=0;l<7;l++){
        var date=daysAgo(l);
        bps2.push({id:genId(),systolic:128+Math.floor(Math.random()*12-6),diastolic:78+Math.floor(Math.random()*10-5),hr:70+Math.floor(Math.random()*12),note:'晨起',time:date+' 08:'+pad(Math.floor(Math.random()*30))})
    }
    bps2.sort(function(a,b){return a.time<b.time?1:-1});
    localStorage.setItem('bp_data_'+p2,JSON.stringify(bps2));
    
    var alerts1=[];
    var missedLogs=logs1.filter(function(l){return l.status==='missed'});
    missedLogs.forEach(function(l){
        var lv=['warn','urgent','critical'][Math.floor(Math.random()*3)];
        alerts1.push({id:genId(),logId:l.id,medName:l.medName,diff:lv==='critical'?45:(lv==='urgent'?30:15),level:lv,status:lv==='warn'?'active':'resolved',time:l.date+' 10:00:00'})
    });
    alerts1.push({id:genId(),logId:genId(),medName:'硝苯地平',diff:25,level:'urgent',status:'active',time:td+' 09:30:00'});
    localStorage.setItem('bp_alerts_'+p1,JSON.stringify(alerts1));
    
    localStorage.setItem('bp_app_alerts',JSON.stringify({l1:10,l2:25,l3:40}));
    localStorage.setItem('bp_push_enabled','0');
    
    window.location.href='app.html'
}
